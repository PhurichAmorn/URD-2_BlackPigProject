name: DooMoo CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DooMoo

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze

      # - name: Verify ONNX model exists
      #   run: |
      #     if [ -f "assets/models/rf_detr_pig.onnx" ]; then
      #       echo "Model found."
      #     else
      #       echo "Error: rf_detr_pig.onnx is missing!"
      #       exit 1
      #     fi

      - name: Run unit tests
        run: flutter test --coverage
